# sqlc 配置
#
# 工作方式：把 queries/*.sql 中的 -- name: XxxByID :one / :many / :exec
# 编译成 Go 类型安全方法。生成代码进 gen/，禁手改。
#
# 使用：
#   cd gateway && sqlc generate -f internal/repo/sqlc.yaml

version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "queries/users.sql"
      - "queries/tenants.sql"
      - "queries/sessions.sql"
      - "queries/identity_credentials.sql"
      - "queries/blacklist.sql"
      - "queries/whitelist.sql"
      - "queries/knowledge.sql"
      - "queries/scam_rules.sql"
      - "queries/risk_level.sql"
      - "queries/samples.sql"
      - "queries/recordings.sql"
      - "queries/call_logs.sql"
      - "queries/voice_models.sql"
      - "queries/voice_samples.sql"
      - "queries/agent_config.sql"
      - "queries/devices.sql"
      - "queries/audit_logs.sql"
      - "queries/appeals.sql"
      - "queries/admin_applications.sql"
      - "queries/permissions.sql"
    schema: "../migrations"
    gen:
      go:
        package: "gen"
        out: "gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
