# 声纹捕手 · nginx 站点配置（裸机单节点，前端 + 后端同入口）
# 放到 /etc/nginx/conf.d/sentinel.conf，然后 nginx -t && systemctl reload nginx
#
# 作用：
#   /          → 前端 Next 服务 127.0.0.1:3000
#   /api/      → 后端网关   127.0.0.1:8080（SSE 已关 buffer）

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name 172.16.30.10;        # 换成你的域名或保留 IP；公网建议上 443+证书

    # 录音 / 模型上传可能较大
    client_max_body_size 500m;

    # ── 后端 API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSE（/api/v1/feed/stream）必须关缓冲 + 长超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 健康检查直通
    location /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8080/api/v1/health;
    }

    # ── 前端 Next（含 /_next/ 静态资源、HMR 已关）────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
